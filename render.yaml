services:
  - type: web
    name: constellation-prototype
    runtime: python
    plan: free
    buildCommand: "python -m pip install --upgrade pip && pip install -e ."
    startCommand: "uvicorn constellation_core.api:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
